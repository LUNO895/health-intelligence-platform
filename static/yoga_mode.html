<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yoga Mode</title>
  <link rel="stylesheet" href="/static/app.css" />
  <style>
    :root {
      --bg: #0b1120;
      --card: rgba(15,23,42,.86);
      --line: rgba(148,163,184,.25);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #60a5fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(900px 420px at -10% -10%, rgba(59,130,246,.22), transparent 55%),
        radial-gradient(760px 340px at 110% 0%, rgba(34,197,94,.16), transparent 50%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap { max-width: 1260px; margin: 0 auto; padding: 1rem; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom: .8rem; }
    a.back { color:#93c5fd; text-decoration:none; }
    h1 { margin: .2rem 0 0; font-size: clamp(1.25rem, 2.7vw, 1.75rem); }
    .layout { display:grid; grid-template-columns: 360px 1fr; gap:1rem; }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
      backdrop-filter: blur(6px);
    }
    .title { margin: 0 0 .75rem; color: var(--muted); text-transform: uppercase; letter-spacing:.08em; font-size:.9rem; }
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(2,6,23,.45);
      color: var(--text);
      border-radius: 12px;
      padding: .55rem .65rem;
      font-size: .92rem;
    }
    .stage {
      position:relative;
      background:#000;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--line);
      aspect-ratio: 4 / 3;
    }
    video, canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; }
    video { transform: scaleX(-1); }
    canvas { transform: scaleX(-1); pointer-events:none; }
    .toolbar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.65rem; }
    button {
      border:1px solid var(--line);
      background: rgba(148,163,184,.12);
      color: var(--text);
      border-radius: 10px;
      padding: .48rem .72rem;
      cursor:pointer;
      font-weight: 650;
    }
    button.primary { border-color: rgba(96,165,250,.45); background: rgba(59,130,246,.2); color: #dbeafe; }
    button.primary:hover { background: rgba(59,130,246,.3); }
    .metrics { display:grid; grid-template-columns: repeat(3, 1fr); gap:.55rem; }
    .metric { border:1px solid var(--line); border-radius: 12px; padding: .6rem; background: rgba(2,6,23,.34); }
    .metric .k { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; }
    .metric .v { margin-top: .15rem; font-weight: 800; font-size: 1.1rem; }
    .status { margin-top:.6rem; color: var(--muted); font-size: .9rem; }
    .tags { margin-top:.5rem; }
    .tag { display:inline-block; margin:.2rem .35rem 0 0; border:1px solid var(--line); border-radius:999px; padding:.12rem .45rem; font-size:.75rem; color: var(--muted); }
    .tag.bad { border-color: rgba(239,68,68,.45); color: #fecaca; }
    .tag.warn { border-color: rgba(245,158,11,.45); color: #fde68a; }
    .tag.good { border-color: rgba(34,197,94,.45); color: #bbf7d0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="tag good">Yoga Guidance Mode</span>
    </div>
    <h1>Yoga Pose Recommendation & Real-Time Guidance</h1>

    <div class="layout">
      <aside class="card">
        <h2 class="title">Select level & pose</h2>
        <label style="color:var(--muted); font-size:.82rem;">Level</label>
        <select id="level">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
        <div style="height:.6rem;"></div>
        <label style="color:var(--muted); font-size:.82rem;">Pose</label>
        <select id="poseSelect"></select>

        <div class="status" id="poseInfo" style="margin-top:.8rem;"></div>
        <div class="tags" id="poseSteps"></div>
      </aside>

      <section class="card">
        <div class="toolbar">
          <button class="primary" id="startBtn" type="button">Start Camera</button>
          <button id="stopBtn" type="button">Stop</button>
        </div>
        <div class="stage">
          <video id="cam" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="metrics" style="margin-top:.75rem;">
          <div class="metric"><div class="k">Accuracy</div><div class="v" id="acc">--%</div></div>
          <div class="metric"><div class="k">Status</div><div class="v" id="status">Waiting</div></div>
          <div class="metric"><div class="k">People</div><div class="v" id="people">0</div></div>
        </div>
        <div id="chipRow" style="margin-top:.55rem;"></div>
        <div class="tags" id="corrections"></div>
        <div class="status" id="note">Tip: keep full body visible for better accuracy.</div>
      </section>
    </div>
  </div>

  <script type="module">
    import { mountNavbar, scoreToChip } from "/static/app.js";
    mountNavbar();

    import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm";

    const video = document.getElementById("cam");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    const levelEl = document.getElementById("level");
    const poseSelectEl = document.getElementById("poseSelect");
    const poseInfoEl = document.getElementById("poseInfo");
    const poseStepsEl = document.getElementById("poseSteps");

    const accEl = document.getElementById("acc");
    const statusEl = document.getElementById("status");
    const peopleEl = document.getElementById("people");
    const correctionsEl = document.getElementById("corrections");

    const POSE_CONNECTIONS = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
    const p = (pts, i) => pts[i];

    function angle(a,b,c){
      const bax = a.x - b.x, bay = a.y - b.y;
      const bcx = c.x - b.x, bcy = c.y - b.y;
      const n1 = Math.hypot(bax,bay), n2 = Math.hypot(bcx,bcy);
      if (n1 < 1e-6 || n2 < 1e-6) return NaN;
      let cos = (bax*bcx + bay*bcy)/(n1*n2);
      cos = Math.max(-1, Math.min(1, cos));
      return Math.acos(cos) * 180 / Math.PI;
    }

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = Math.max(1, Math.floor(rect.width));
      const h = Math.max(1, Math.floor(rect.height));
      if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const POSES = {
      beginner: [
        { id: "mountain", name: "Mountain (Tadasana)", steps: ["Stand tall", "Relax shoulders", "Arms by sides"], check: (pts) => {
          const sh = Math.abs(p(pts,11).y - p(pts,12).y);
          const hip = Math.abs(p(pts,23).y - p(pts,24).y);
          const score = 100 - (sh*900 + hip*900);
          const corr = [];
          if (sh > 0.03) corr.push("Level your shoulders");
          if (hip > 0.03) corr.push("Level your hips");
          return { score: Math.max(0, Math.min(100, score)), corr };
        }},
        { id: "tree", name: "Tree (Vrikshasana)", steps: ["Foot on inner thigh/calf", "Hands together or overhead", "Fix gaze"], check: (pts) => {
          const kneeL = angle(p(pts,25), p(pts,23), p(pts,27));
          const kneeR = angle(p(pts,26), p(pts,24), p(pts,28));
          const oneBent = (Number.isFinite(kneeL) && kneeL < 140) || (Number.isFinite(kneeR) && kneeR < 140);
          const sh = Math.abs(p(pts,11).y - p(pts,12).y);
          let score = 55;
          const corr = [];
          if (oneBent) score += 35; else corr.push("Bend one knee and place foot on calf/thigh");
          if (sh < 0.03) score += 10; else corr.push("Keep shoulders level");
          return { score: Math.max(0, Math.min(100, score)), corr };
        }},
      ],
      intermediate: [
        { id: "warrior2", name: "Warrior II (Virabhadrasana II)", steps: ["Front knee bent", "Arms straight", "Gaze forward"], check: (pts) => {
          const kneeL = angle(p(pts,25), p(pts,23), p(pts,27));
          const kneeR = angle(p(pts,26), p(pts,24), p(pts,28));
          const hasBent = (Number.isFinite(kneeL) && kneeL < 120) || (Number.isFinite(kneeR) && kneeR < 120);
          const elL = angle(p(pts,13), p(pts,11), p(pts,15));
          const elR = angle(p(pts,14), p(pts,12), p(pts,16));
          const armsStraight = (Number.isFinite(elL) && elL > 155) && (Number.isFinite(elR) && elR > 155);
          let score = 45;
          const corr = [];
          if (hasBent) score += 35; else corr.push("Bend your front knee more");
          if (armsStraight) score += 20; else corr.push("Straighten both arms");
          return { score: Math.max(0, Math.min(100, score)), corr };
        }},
      ],
      advanced: [
        { id: "chair", name: "Chair (Utkatasana)", steps: ["Sit back", "Knees track forward", "Arms overhead"], check: (pts) => {
          const kneeL = angle(p(pts,25), p(pts,23), p(pts,27));
          const kneeR = angle(p(pts,26), p(pts,24), p(pts,28));
          const goodDepth = (Number.isFinite(kneeL) && kneeL < 115) || (Number.isFinite(kneeR) && kneeR < 115);
          let score = 50;
          const corr = [];
          if (goodDepth) score += 30; else corr.push("Sit back and go a bit lower");
          return { score: Math.max(0, Math.min(100, score)), corr };
        }},
      ]
    };

    function setPoseOptions() {
      const level = levelEl.value;
      poseSelectEl.innerHTML = "";
      for (const p of POSES[level]) {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name;
        poseSelectEl.appendChild(opt);
      }
      renderPoseInfo();
    }

    function selectedPose() {
      const level = levelEl.value;
      const id = poseSelectEl.value;
      return POSES[level].find((x) => x.id === id) || POSES[level][0];
    }

    function renderPoseInfo() {
      const pose = selectedPose();
      poseInfoEl.textContent = `Selected: ${pose.name}`;
      poseStepsEl.innerHTML = (pose.steps || []).map((s) => `<span class="tag good">${s}</span>`).join("");
    }

    levelEl.addEventListener("change", setPoseOptions);
    poseSelectEl.addEventListener("change", renderPoseInfo);
    setPoseOptions();

    let landmarker = null;
    let running = false;
    let lastTime = -1;

    async function loadModel() {
      const wasm = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm";
      const vision = await FilesetResolver.forVisionTasks(wasm);
      landmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          delegate: "CPU"
        },
        runningMode: "VIDEO",
        numPoses: 4,
        minPoseDetectionConfidence: 0.5,
        minPosePresenceConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
    }

    function draw(lms) {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0,0,w,h);
      if (!lms || !lms.length) return null;
      const pts = lms.map((k) => ({ x: k.x * w, y: k.y * h, z: k.z }));
      ctx.strokeStyle = "rgba(96,165,250,.85)";
      ctx.lineWidth = 3;
      for (const [a,b] of POSE_CONNECTIONS) {
        const pa = pts[a], pb = pts[b];
        if (!pa || !pb) continue;
        ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
      }
      ctx.fillStyle = "rgba(251,191,36,.95)";
      for (const point of pts) { ctx.beginPath(); ctx.arc(point.x,point.y,4,0,Math.PI*2); ctx.fill(); }
      return pts;
    }

    function updateGuidance(pts) {
      const pose = selectedPose();
      const { score, corr } = pose.check(pts);
      accEl.textContent = `${Math.round(score)}%`;
      statusEl.textContent = score >= 85 ? "Correct" : score >= 70 ? "Almost" : "Incorrect";
      const chip = scoreToChip(score);
      document.getElementById("chipRow").innerHTML = `<span class="chip ${chip.cls}"><span class="dot"></span>${chip.label}</span>`;
      correctionsEl.innerHTML = (corr || []).slice(0,4).map((c) => `<span class="tag warn">${c}</span>`).join("");
      if (!corr.length) correctionsEl.innerHTML = `<span class="tag good">Great posture—hold steady</span>`;
    }

    async function startCam() {
      try {
        if (!landmarker) await loadModel();
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;
        await video.play();
        running = true;
        lastTime = -1;
        requestAnimationFrame(loop);
      } catch (e) {
        statusEl.textContent = "Error";
      }
    }

    function stopCam() {
      running = false;
      const s = video.srcObject;
      if (s && s.getTracks) s.getTracks().forEach((t) => t.stop());
      video.srcObject = null;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      accEl.textContent = "--%";
      statusEl.textContent = "Stopped";
      peopleEl.textContent = "0";
      correctionsEl.innerHTML = "";
    }

    function loop() {
      if (!running || !landmarker) return;
      resizeCanvas();
      if (video.videoWidth && video.videoHeight) {
        const now = performance.now();
        if (video.currentTime !== lastTime) {
          lastTime = video.currentTime;
          const res = landmarker.detectForVideo(video, now);
          const count = (res.landmarks || []).length;
          peopleEl.textContent = String(count);
          const lm = res.landmarks && res.landmarks[0];
          const pts = draw(lm);
          if (pts) updateGuidance(pts);
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById("startBtn").addEventListener("click", startCam);
    document.getElementById("stopBtn").addEventListener("click", stopCam);
  </script>
</body>
</html>
